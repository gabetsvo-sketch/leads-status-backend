name: CI + Deploy

# Защита выкладки (§12.4 стандарта VIBE-CODE v0.01.001):
# на каждый push в main сначала ПРОВЕРКА (страж версии + тесты),
# деплой на Render — только если проверка прошла И изменён код продукта
# (main.py / requirements.txt). Правки документов/тестов/CI не вызывают
# редеплой. Аварийный деплой: ручной запуск (Run workflow) с force_deploy=true
# либо кнопка Deploy в самом Render.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Деплоить даже если проверки не прошли / без изменения кода (аварийно)"
        type: boolean
        default: false

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      product_changed: ${{ steps.guard.outputs.product_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # нужна история для стража версии (git show before:VERSION.json)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"  # как в Render (render.yaml PYTHON_VERSION)
      - name: Установить зависимости
        run: pip install -r requirements.txt
      - id: guard
        name: Страж версии — код изменён → версия поднята (§12.4)
        if: github.event_name == 'push'
        run: python tools/ci_version_guard.py "${{ github.event.before }}" "${{ github.sha }}"
      - name: Тесты (полный набор, блокирует деплой)
        run: pytest tests/ -q

  deploy:
    needs: verify
    # Деплоим если проверка прошла И изменён код продукта; либо ручной аварийный
    # запуск с force_deploy=true.
    if: ${{ always() && ((needs.verify.result == 'success' && needs.verify.outputs.product_changed == 'true') || (github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy == 'true')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write  # для простановки release-тега
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Триггер деплоя на Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: srv-d7n3t4gsfn5c73drkpmg
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::error::RENDER_API_KEY secret is not set in repo settings."
            exit 1
          fi
          response=$(curl -sS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -d '{}')
          echo "Render API response:"
          echo "$response"
          deploy_id=$(echo "$response" | python3 -c "import json,sys; print(json.load(sys.stdin).get('id',''))")
          if [ -z "$deploy_id" ]; then
            echo "::error::Failed to trigger deploy."
            exit 1
          fi
          echo "Deploy triggered: $deploy_id"
      - name: Пометить релиз тегом v<версия> (трассируемость §11.5)
        continue-on-error: true  # сбой тега не должен ломать успешный деплой
        run: |
          ver=$(python3 -c "import json; v=json.load(open('VERSION.json')); print(f\"v{v['generation']}.{v['milestone']:02d}.{v['revision']:03d}\")")
          if git rev-parse "$ver" >/dev/null 2>&1; then
            echo "Тег $ver уже существует — пропускаю (один тег = один артефакт)."
          else
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git tag -a "$ver" -m "Release $ver (deploy $GITHUB_SHA)"
            git push origin "$ver"
            echo "Создан release-тег $ver на $GITHUB_SHA"
          fi
