services:
  - type: web
    name: leads-status
    runtime: python
    plan: free
    region: singapore
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TG_API_ID
        sync: false
      - key: TG_API_HASH
        sync: false
      - key: TG_CHAT_ID
        sync: false
      - key: WIDGET_TOKEN
        sync: false
      - key: TG_SESSION_STRING
        sync: false
      - key: INTERNAL_TOKEN
        sync: false
      - key: STYLE_RUNTIME_SOURCE
        sync: false
      - key: STYLE_RUNTIME_R2_ENDPOINT
        sync: false
      - key: STYLE_RUNTIME_R2_BUCKET
        sync: false
      - key: STYLE_RUNTIME_R2_PREFIX
        sync: false
      - key: STYLE_RUNTIME_CACHE_TTL_SECONDS
        sync: false
      - key: STYLE_RUNTIME_R2_ACCESS_KEY_ID
        sync: false
      - key: STYLE_RUNTIME_R2_SECRET_ACCESS_KEY
        sync: false
      - key: STYLE_RUNTIME_HTTP_BASE_URL
        sync: false
      - key: STYLE_RUNTIME_HTTP_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
